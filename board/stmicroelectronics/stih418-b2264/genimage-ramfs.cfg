image boot.vfat {
	vfat {
		files = {
			"devicetree.dtb",
			"uImage",
			"uenv.txt",
			"u-boot-spl.bin",
			"u-boot.img",
		}
		file uboot.env {
			image = "uboot-env.bin"
		}
		file uramdisk.image {
			image = "rootfs.cpio.uboot"
		}
	}
	size = 128M
}

image sdcard.img {
	hdimage {
	}

	partition boot {
		partition-type = 0xC
		bootable = "true"
		image = "boot.vfat"
	}
}
